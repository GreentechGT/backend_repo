services:
  - type: web
    name: milkqera-backend
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn milk_delivery_backend.wsgi
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: milkqera-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

databases:
  - name: milkqera-db
    plan: free
